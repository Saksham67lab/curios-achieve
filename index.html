<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Curious Archive</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

nav{
background:#111;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#b388ff;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:50px;
margin-bottom:15px;
}

.hero p{
color:#aaa;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.section-title{
margin-bottom:20px;
color:#b388ff;
}

.card{
background:#171717;
border-radius:15px;
overflow:hidden;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
display:block;
}

.card-content{
padding:20px;
}

.card h3{
margin-bottom:10px;
}

.card p{
color:#bbb;
}

a{
text-decoration:none;
color:inherit;
}

footer{
text-align:center;
padding:30px;
margin-top:40px;
border-top:1px solid #222;
color:#aaa;
}

@media(max-width:768px){
.container{
grid-template-columns:1fr;
}
}
</style>

</head>
<body>

<nav>
The Curious Archive
</nav>

<section class="hero">
<h1>Stories That Entertain</h1>
<p>Psychology, Science and Fiction</p>
</section>

<div class="container">

<div>

<p>Click to read the story.</p>
</div>
</div>
</a>

</div>

<div>

<h2 class="section-title">🧠 Psychology & Ideas</h2>

<a href="butterfly.html">
<div class="card">
<img src="https://picsum.photos/600/300?random=2">
<div class="card-content">
<h3>The Butterfly Effect</h3>
<p>How small actions create huge consequences.</p>
</div>
</div>
</a>

</div>

</div>

<footer>
© 2026 The Curious Archive
</footer>

</body>
</html>
